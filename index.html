<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LogoType Lab</title>
    <meta name="description" content="A browser-based typography logo tool for shaping blur, pixel, slice, line, and variable type effects.">
    <meta property="og:title" content="LogoType Lab">
    <meta property="og:description" content="Design experimental typography logos directly in the browser.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://logotype-lab.vercel.app/">
    <meta property="og:image" content="https://logotype-lab.vercel.app/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LogoType Lab">
    <meta name="twitter:description" content="Design experimental typography logos directly in the browser.">
    <meta name="twitter:image" content="https://logotype-lab.vercel.app/og-image.png">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="LogoType Lab home">Type</a>
      <div class="dropdown">
        <select id="toolSelect" aria-label="Tools">
          <option value="blur">Blur</option>
          <option value="dither">Dither</option>
          <option value="line">Line</option>
          <option value="slice">Slice</option>
          <option value="type" selected>Type</option>
        </select>
      </div>
    </header>

    <main class="workspace">
      <section class="stage" aria-label="Logo preview">
        <canvas id="logoCanvas" width="1600" height="1000"></canvas>
      </section>

      <aside class="panel" aria-label="Logo controls">
        <section class="panel-section">
          <label for="logoText">Text</label>
          <input id="logoText" type="text" value="AURA" autocomplete="off" maxlength="18">
        </section>

        <section class="panel-section">
          <label for="fontFamily">Font</label>
          <select id="fontFamily">
            <option value="Arial Black, Arial, sans-serif">Arial Black</option>
            <option value="Impact, Haettenschweiler, sans-serif">Impact</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="Trebuchet MS, Arial, sans-serif">Trebuchet</option>
            <option value="Courier New, monospace">Courier</option>
          </select>
        </section>

        <section class="panel-section slider-row">
          <label for="fontSize">Size <span id="fontSizeValue">330</span></label>
          <input id="fontSize" type="range" min="110" max="520" value="330">
        </section>

        <section class="panel-section slider-row">
          <label for="letterSpacing">Spacing <span id="letterSpacingValue">-18</span></label>
          <input id="letterSpacing" type="range" min="-60" max="140" value="-18">
        </section>

        <section class="panel-section slider-row">
          <label for="effectStrength">Effect <span id="effectStrengthValue">56</span></label>
          <input id="effectStrength" type="range" min="0" max="100" value="56">
        </section>

        <section class="panel-section two-col">
          <div>
            <label for="textColor">Text</label>
            <input id="textColor" type="color" value="#ffffff">
          </div>
          <div>
            <label for="backgroundColor">Background</label>
            <input id="backgroundColor" type="color" value="#111111">
          </div>
        </section>

        <section class="panel-section">
          <label>Style</label>
          <div class="toggles">
            <button class="toggle is-on" type="button" id="boldToggle" aria-pressed="true">Bold</button>
            <button class="toggle" type="button" id="italicToggle" aria-pressed="false">Italic</button>
            <button class="toggle" type="button" id="invertToggle" aria-pressed="false">Invert</button>
            <button class="toggle" type="button" id="animateToggle" aria-pressed="false">Animate</button>
          </div>
        </section>

        <section class="panel-section presets">
          <label>Presets</label>
          <div class="preset-grid">
            <button type="button" data-preset="signal">Signal</button>
            <button type="button" data-preset="glass">Glass</button>
            <button type="button" data-preset="index">Index</button>
            <button type="button" data-preset="cut">Cut</button>
          </div>
        </section>

        <section class="panel-section actions">
          <button class="secondary-button" type="button" id="randomize">Random</button>
          <button class="export-button" type="button" id="exportPng">Export PNG</button>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
